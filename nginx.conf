server {
    listen 80;
    server_name time.to.go.xn--80a6ad.space;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name time.to.go.xn--80a6ad.space;

    ssl_certificate /etc/letsencrypt/live/time.to.go.xn--80a6ad.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/time.to.go.xn--80a6ad.space/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|wasm|json)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/wasm;
}
